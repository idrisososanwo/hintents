name: Fuzz Testing CI

on:
  push:
    paths:
      - 'simulator/**'
      - '.github/workflows/fuzz.yml'
  pull_request:
    paths:
      - 'simulator/**'
      - '.github/workflows/fuzz.yml'

jobs:
  sancov_build:
    name: Compile SanitizerCoverage Harness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust Stable Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Go modules and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Cache Cargo dependencies and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            simulator/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('simulator/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Reclaim runner temp space before fuzz build
        run: bash ./scripts/ci-clean-build-space.sh

      - name: Execute LLVM SanitizerCoverage Pass
        working-directory: ./simulator
        run: cargo rustc --bin simulator -- -C passes=sancov-module

      - name: Reclaim runner temp space after fuzz build
        if: always()
        run: bash ./scripts/ci-clean-build-space.sh
