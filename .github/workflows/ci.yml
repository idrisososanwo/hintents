name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # Detect which paths changed
  # ============================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      go: ${{ steps.filter.outputs.go }}
      rust: ${{ steps.filter.outputs.rust }}
      docs: ${{ steps.filter.outputs.docs }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Path filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.golangci.yml'
            rust:
              - 'simulator/**'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - '**/*.rs'
            docs:
              - '**/*.md'
            ci:
              - '.github/workflows/ci.yml'

  # ============================================
  # License Header Check
  # ============================================
  license-headers:
    name: License Headers Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check license headers (Go, Rust, TypeScript)
        run: ./scripts/check-license-headers.sh

      - name: Guard against conflict markers and leaked secrets
        run: |
          set -euo pipefail

          echo "Checking for unresolved merge conflict markers..."
          if grep -RInE --binary-files=without-match --exclude-dir='.git' "^(<{7}|={7}|>{7})( .*)?$" . > /tmp/conflict-markers.txt; then
            echo "[FAIL] Unresolved merge conflict markers found:"
            cat /tmp/conflict-markers.txt
            exit 1
          fi

          echo "Checking for common secret patterns..."
          if grep -RInE --binary-files=without-match --exclude='*.md' --exclude-dir='.git' --exclude-dir='examples' -- "-----BEGIN (RSA|EC|OPENSSH|DSA|PRIVATE KEY)-----|AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{36}|xox[baprs]-" . > /tmp/secret-patterns.txt; then
            echo "[FAIL] Potential secrets detected in tracked files:"
            cat /tmp/secret-patterns.txt
            exit 1
          fi

          echo " Repository sanity checks passed"

  # ============================================
  # Go CLI - Lint, Build & Test
  # ============================================
  go:
    name: Go CI (${{ matrix.go-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [license-headers, changes]
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'push'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ["1.25.0"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: go.sum

      - name: Verify dependencies
        run: go mod verify

      - name: Check formatting
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.25.0'
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "[FAIL] Go files are not formatted. Run 'go fmt ./...' to fix."
            gofmt -d .
            exit 1
          fi
          echo " All Go files are properly formatted"

      - name: Run go vet
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.25.0'
        run: go vet ./...

      - name: Install golangci-lint
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.25.0'
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --config=.golangci.yml --timeout=5m

      - name: Run gosec
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.23'
        uses: securego/gosec@master
        with:
          args: "-severity high ./..."

      - name: Run tests
        run: go test -v -race ./...

      - name: Build
        run: go build -v ./...

      - name: Build erst binary for integration tests
        run: go build -o erst ./cmd/erst

      - name: Run tests (race)
        if: matrix.os == 'ubuntu-latest'
        run: go test -v -race ./...

      - name: Run tests (compile-only)
        if: matrix.os != 'ubuntu-latest'
        run: go test -short -run '^$' -v ./...

  # ============================================
  # Cross-Platform CLI Binary Integration
  # ============================================
  cli-integration:
    name: CLI Integration (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [license-headers, changes]
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          cache: true
          cache-dependency-path: go.sum

      - name: Run CLI integration suite via os/exec
        run: go test -v ./tests -run TestErstBinaryFullCLISurface -count=1

  # ============================================
  # Rust Simulator - Lint, Build & Test
  # ============================================
  rust:
    name: Rust CI (${{ matrix.rust-version }})
    runs-on: ubuntu-latest
    needs: license-headers
    strategy:
      matrix:
        rust-version: [stable, "1.87"]
    defaults:
      run:
        working-directory: simulator

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust-version }}
          components: rustfmt, clippy

      - name: Reclaim runner temp space before Rust build
        run: bash ../scripts/ci-clean-build-space.sh

      - name: Cache Cargo dependencies and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: simulator -> target
          prefix-key: v2-${{ runner.os }}-rust-${{ matrix.rust-version }}
          cache-targets: true

      - name: Check formatting
        if: matrix.rust-version == 'stable'
        run: |
          cargo fmt --check || {
            echo "[FAIL] Rust files are not formatted. Run 'cargo fmt' to fix."
            exit 1
          }
          echo " All Rust files are properly formatted"

      - name: Run Clippy (strict mode)
        if: matrix.rust-version == 'stable'
        run: |
          echo "Running Clippy with strict warnings..."
          cargo clippy --all-targets --all-features -- \
            -D warnings \
            -D clippy::all \
            -D unused-variables \
            -D unused-imports \
            -D unused-mut \
            -D dead-code \
            -D unused-assignments || {
            echo "[FAIL] Clippy found issues that must be fixed"
            exit 1
          }
          echo " Clippy checks passed"

      - name: Run tests
        run: cargo test --verbose

      - name: Build
        run: cargo build --verbose

      - name: Prune Rust target before cache save
        if: always()
        run: bash ../scripts/prune-rust-target-cache.sh target

      - name: Reclaim runner temp space after Rust build
        if: always()
        run: bash ../scripts/ci-clean-build-space.sh

  # ============================================
  # Simulator Performance Regression Tests
  # ============================================
  perf-regression:
    name: Performance Regression
    runs-on: ubuntu-latest
    needs: [license-headers, changes]
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          cache: true
          cache-dependency-path: go.sum

      - name: Run performance regression tests
        run: |
          echo "Running simulator performance regression tests..."
          go test -v -run 'TestPerfRegression' ./internal/simulator/... || {
            echo "[FAIL] Performance regression detected - execution time or memory exceeded 10% threshold"
            exit 1
          }
          echo " Performance regression tests passed"

  # ============================================
  # Docs - Spell Check
  # ============================================
  docs-spellcheck:
    name: Docs Spellcheck
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install misspell
        run: |
          curl -L https://raw.githubusercontent.com/client9/misspell/master/install-misspell.sh | sh -s -- -b "$HOME/bin"
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Run spellcheck
        run: |
          set -euo pipefail
          IGNORE_WORDS=$(paste -sd, .github/spelling/allow.txt)
          find . -name '*.md' -print0 | xargs -0 misspell -error -i "$IGNORE_WORDS"

  # ============================================
  # Gate - all required jobs must pass for merge
  # ============================================
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: always()
    needs: [go, rust, cli-integration, docs-spellcheck, perf-regression]
    steps:
      - name: Check job results
        shell: bash
        run: |
          set -euo pipefail

          declare -A results=(
            [go]="${{ needs.go.result }}"
            [rust]="${{ needs.rust.result }}"
            [cli-integration]="${{ needs.cli-integration.result }}"
            [docs-spellcheck]="${{ needs.docs-spellcheck.result }}"
            [perf-regression]="${{ needs.perf-regression.result }}"
          )

          echo "=== Job results ==="
          for job in "${!results[@]}"; do
            echo "$job: ${results[$job]}"
          done

          failed=0
          echo "=== Failures / cancellations ==="
          for job in go rust cli-integration docs-spellcheck perf-regression; do
            case "${results[$job]}" in
              failure|cancelled)
                echo "[BLOCKING] $job is ${results[$job]}"
                failed=1
                ;;
              skipped|success)
                ;;
              *)
                echo "[WARN] $job has unexpected result: ${results[$job]}"
                ;;
            esac
          done

          if [ "$failed" -ne 0 ]; then
            echo "CI gate failed: one or more required jobs did not pass."
            exit 1
          fi

          echo "All CI checks passed or were correctly skipped."
